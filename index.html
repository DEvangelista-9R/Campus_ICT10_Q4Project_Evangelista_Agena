<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Sapphire Website</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">

    <!-- Your CSS file -->
    <link rel="stylesheet" href="style.css">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <script>
        function showTab(tabId) {
            document.getElementById("gallery-tab").style.display = "none";
            document.getElementById("classmates-tab").style.display = "none";
            document.getElementById("attendance-tab").style.display = "none";

            document.getElementById(tabId).style.display = "block";
        }
    </script>

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <h5 class="navbar-brand">
            <a href="#" onclick="showTab('gallery-tab')">
                10 RUBY
            </a>
        </h5>

        <div>
            <button class="btn btn-tab" onclick="showTab('gallery-tab')">Gallery</button>
            <button class="btn btn-tab" onclick="showTab('classmates-tab')">Classmates</button>
            <button class="btn btn-tab" onclick="showTab('attendance-tab')">Attendance Tracker</button>
        </div>

    </div>

</nav>

<div id="gallery-tab" style="display:block;">
    <div class="container">
        <h1 class="text-center mb-4">Gallery</h1>

        <div class="row text-center">

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h6>CAT Graduation</h6>
                    <img src="Grad.jpg.jpg" class="img-fluid">
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h6>PE Dance 1</h6>
                    <img src="PE.jpg.jpg" class="img-fluid">
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h6>Christmas Party</h6>
                    <img src="Party.jpg.jpeg" class="img-fluid">
                </div>
            </div>

        </div>
    </div>
</div>

<div id="classmates-tab" style="display:none;">
    <div class="container">

        <h1>Classmate Introduction Program</h1>

        <div class="card p-4">

            <label>Name:</label>
            <input type="text" id="name" class="form-control mb-2">

            <label>Section:</label>
            <select id="section" class="form-control mb-2">
                <option>Ruby</option>
                <option>Sapphire</option>
                <option>Topaz</option>
                <option>Emerald</option>
            </select>

            <label>Favorite Subject:</label>
            <input type="text" id="favorite_subject" class="form-control mb-3">

            <button class="btn btn-primary" py-click="add_classmate">
                Add Classmate
            </button>

        </div>

        <div id="output" class="mt-3"></div>

    </div>
</div>

<div id="attendance-tab" style="display:none;">
    <div class="container">

        <h1>Attendance Tracker</h1>

        <div class="card p-4">

            <select id="day" class="form-control mb-2">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>

            <input type="number" id="value" class="form-control mb-2" placeholder="Enter absences">

            <button class="btn btn-success" py-click="submit_data">Submit</button>
            <button class="btn btn-secondary" onclick="location.reload()">Refresh</button>

        </div>

        <div id="plot" class="mt-3"></div>

    </div>
</div>

<py-script src="main.py"></py-script>

</body>
</html>
